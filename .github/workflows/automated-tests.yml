# --------------------------------------------------
# Workflow name
# --------------------------------------------------
#
# This name appears in the GitHub Actions tab.

name: Day AI Planner Tests


# --------------------------------------------------
# Workflow triggers
# --------------------------------------------------
#
# These events tell GitHub when the workflow must run.

on:

  # Run automatically whenever code is pushed
  # to the main branch.
  push:
    branches:
      - main

  # Run automatically when a pull request
  # wants to merge code into the main branch.
  pull_request:
    branches:
      - main

  # Allow us to run the workflow manually
  # from the GitHub Actions page.
  workflow_dispatch:


# --------------------------------------------------
# Workflow permissions
# --------------------------------------------------
#
# The workflow only needs permission to read
# the repository files.

permissions:
  contents: read


# --------------------------------------------------
# Workflow jobs
# --------------------------------------------------

jobs:

  # Internal name of the automated testing job.
  run-tests:

    # GitHub creates a temporary Ubuntu machine
    # on which this job will run.
    runs-on: ubuntu-latest

    # Stop the job if it takes more than 10 minutes.
    timeout-minutes: 10

    # Steps run from top to bottom.
    steps:

      # --------------------------------------------
      # Step 1: Download repository files
      # --------------------------------------------

      - name: Checkout repository

        # Copy the GitHub repository files into
        # the temporary Ubuntu runner.
        uses: actions/checkout@v7


      # --------------------------------------------
      # Step 2: Install Python
      # --------------------------------------------

      - name: Set up Python 3.12

        # Install and configure Python.
        uses: actions/setup-python@v6

        with:

          # Use the same stable Python version
          # selected for deployment compatibility.
          python-version: "3.12"

          # Cache downloaded pip packages so future
          # workflow runs can be faster.
          cache: "pip"

          # Recreate the cache whenever the
          # requirements file changes.
          cache-dependency-path: requirements.txt


      # --------------------------------------------
      # Step 3: Display Python version
      # --------------------------------------------

      - name: Display Python version

        # This helps us confirm which Python
        # version GitHub is using.
        run: python --version


      # --------------------------------------------
      # Step 4: Install dependencies
      # --------------------------------------------

      - name: Install dependencies

        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt


      # --------------------------------------------
      # Step 5: Run automated tests
      # --------------------------------------------

      - name: Run all automated tests

        # Discover and execute all tests stored
        # inside the tests folder.
        run: python -m unittest discover -s tests -v